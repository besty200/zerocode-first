<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Мой Flask-сайт{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            color: #222;
        }

        header {
            background: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }

        nav {
            background: #34495e;
            padding: 12px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
        }

        main {
            max-width: 900px;
            margin: 30px auto;
            padding: 25px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        footer {
            margin-top: 40px;
            padding: 15px;
            text-align: center;
            background: #2c3e50;
            color: white;
        }
    </style>
</head>
<body>
    <header>
        <h1>{% block header %}Мой сайт на Flask{% endblock %}</h1>
    </header>

    <nav>
        <a href="/home">Главная</a>
        <a href="/about">О нас</a>
    </nav>

    <main>
        {% block content %}
        <p>Это базовый шаблон сайта</p>
        <!-- Секция 1: Слайдер -->
    <section class="mb-5">
      <h2 id="main" class="text-center mb-4">Галерея</h2>

      <div id="slider" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner rounded shadow">

          <div class="carousel-item active">
            <img src="https://picsum.photos/id/1015/1200/500" class="d-block w-100" alt="">
          </div>

          <div class="carousel-item">
            <img src="https://picsum.photos/id/1016/1200/500" class="d-block w-100" alt="">
          </div>

          <div class="carousel-item">
            <img src="https://picsum.photos/id/1018/1200/500" class="d-block w-100" alt="">
          </div>

        </div>

        <button class="carousel-control-prev" type="button" data-bs-target="#slider" data-bs-slide="prev">
          <span class="carousel-control-prev-icon"></span>
        </button>

        <button class="carousel-control-next" type="button" data-bs-target="#slider" data-bs-slide="next">
          <span class="carousel-control-next-icon"></span>
        </button>
      </div>
    </section>
        {% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 Мой Flask-сайт</p>
    </footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
